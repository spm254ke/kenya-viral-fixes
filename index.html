        .card:hover { transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0,0,0,0.1); }
        .card h3 { margin-top: 10px; font-size: 1.2rem; color: #1a1a1a; }
        .category { font-size: 0.7rem; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .price { font-size: 1.4rem; font-weight: 800; margin: 15px 0; color: #333; }
        .btn { background: var(--mpesa); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; transition: 0.2s; }
        .btn:hover { background: #3d8b40; }
        /* Category Colors */
        .c-kra { border-color: var(--kra); } .c-mpesa { border-color: var(--mpesa); } .c-sha { border-color: var(--sha); }
